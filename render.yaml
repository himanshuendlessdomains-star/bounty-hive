services:
  - type: web
    name: bounty-hive-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: node backend/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: development
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: TON_NETWORK
        value: testnet
