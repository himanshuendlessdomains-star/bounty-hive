services:
  - type: web
    name: bounty-hive-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: node backend/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false  # set to your Vercel URL, e.g. https://bounty-hive.vercel.app
      - key: FACTORY_ADDRESS
        sync: false  # set after deploying contracts to mainnet
      - key: TON_NETWORK
        value: testnet
